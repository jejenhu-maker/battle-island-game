<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Battle Island</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  overflow: hidden; 
  background: #000; 
  font-family: 'Courier New', monospace;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas { display: block; }

#ui-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 10;
}

#hud {
  position: absolute;
  top: 15px; left: 15px; right: 15px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  color: #0f0;
  font-size: 14px;
  text-shadow: 0 0 6px #0f0;
}

#hp-bar-container {
  width: 120px;
  height: 12px;
  border: 2px solid #0f0;
  background: rgba(0,0,0,0.5);
}
#hp-bar {
  width: 100%;
  height: 100%;
  background: #0f0;
  transition: width 0.3s;
}

/* ─── Virtual Joystick ─── */
#joystick-zone {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 140px;
  height: 140px;
  pointer-events: auto;
}
#joystick-base {
  position: absolute;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.3);
}
#joystick-thumb {
  position: absolute;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
  border: 2px solid rgba(255,255,255,0.5);
  left: 45px;
  top: 45px;
  transition: none;
}

#fire-btn {
  position: absolute;
  bottom: 40px;
  right: 30px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,60,60,0.9), rgba(200,0,0,0.7));
  border: 3px solid rgba(255,100,100,0.8);
  color: #fff;
  font-size: 12px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
  text-shadow: 0 0 4px #fff;
  box-shadow: 0 0 20px rgba(255,0,0,0.5);
}
#fire-btn:active {
  background: radial-gradient(circle, rgba(255,120,120,1), rgba(255,40,40,0.9));
  transform: scale(0.92);
}

#title-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, #0a0a2e 0%, #1a0a3e 50%, #0a1a2e 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  color: #fff;
}
#title-screen h1 {
  font-size: 42px;
  color: #ff6600;
  text-shadow: 0 0 20px #ff6600, 0 0 40px #ff3300;
  margin-bottom: 10px;
  letter-spacing: 4px;
}
#title-screen .subtitle {
  font-size: 14px;
  color: #88aaff;
  margin-bottom: 50px;
  letter-spacing: 2px;
}
#start-btn {
  padding: 15px 50px;
  font-size: 20px;
  font-family: 'Courier New', monospace;
  background: transparent;
  border: 2px solid #ff6600;
  color: #ff6600;
  cursor: pointer;
  letter-spacing: 3px;
  text-shadow: 0 0 10px #ff6600;
  pointer-events: auto;
  animation: pulse 2s infinite;
}
#start-btn:active { transform: scale(0.95); }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 10px rgba(255,102,0,0.3); }
  50% { box-shadow: 0 0 25px rgba(255,102,0,0.6); }
}

#intro-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 90;
  color: #fff;
}
#intro-text {
  font-size: 24px;
  color: #ff6600;
  text-shadow: 0 0 15px #ff6600;
  letter-spacing: 3px;
  animation: fadeInOut 3s forwards;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateY(20px); }
  20% { opacity: 1; transform: translateY(0); }
  80% { opacity: 1; }
  100% { opacity: 0; }
}

#game-over-screen, #level-clear-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 80;
  color: #fff;
}
#game-over-screen h2 { color: #ff3333; font-size: 36px; text-shadow: 0 0 20px #ff0000; margin-bottom: 15px; }
#level-clear-screen h2 { color: #33ff33; font-size: 36px; text-shadow: 0 0 20px #00ff00; margin-bottom: 15px; }
.screen-btn {
  margin-top: 25px;
  padding: 12px 40px;
  font-size: 16px;
  font-family: 'Courier New', monospace;
  background: transparent;
  border: 2px solid #fff;
  color: #fff;
  cursor: pointer;
  pointer-events: auto;
  letter-spacing: 2px;
}
.info-text { font-size: 14px; color: #aaa; margin-top: 8px; }
</style>
</head>
<body>

<div id="title-screen">
  <h1>BATTLE ISLAND</h1>
  <div class="subtitle">VOXEL AIR COMBAT</div>
  <button id="start-btn">START GAME</button>
</div>

<div id="intro-overlay">
  <div id="intro-text">APPROACHING BATTLE ISLAND...</div>
</div>

<div id="game-over-screen">
  <h2>DESTROYED</h2>
  <div class="info-text" id="go-reason"></div>
  <button class="screen-btn" id="retry-btn">RETRY</button>
</div>

<div id="level-clear-screen">
  <h2>LEVEL CLEAR!</h2>
  <div class="info-text" id="clear-info"></div>
  <button class="screen-btn" id="next-btn">NEXT LEVEL</button>
</div>

<div id="ui-overlay">
  <div id="hud" style="display:none;">
    <div>
      <div>LEVEL <span id="hud-level">1</span></div>
      <div>SCORE <span id="hud-score">0</span></div>
      <div style="margin-top:4px;">
        <div id="hp-bar-container"><div id="hp-bar"></div></div>
      </div>
    </div>
    <div style="text-align:right;">
      <div>ENEMIES <span id="hud-enemies">1</span></div>
      <div>★ <span id="hud-stars">0</span></div>
    </div>
  </div>
  
  <!-- Virtual Joystick -->
  <div id="joystick-zone" style="display:none;">
    <div id="joystick-base">
      <div id="joystick-thumb"></div>
    </div>
  </div>
  
  <div id="fire-btn" style="display:none;">FIRE</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── Game State ───
const state = {
  phase: 'title',
  level: 1,
  score: 0,
  stars: 0,
  hp: 3,
  maxHp: 3,
  enemyCount: 1,
  bulletLevel: 1,
  // Player position & velocity
  playerX: 0,
  playerY: 8,
  playerZ: 0,
  playerVX: 0, // velocity X
  playerVY: 0, // velocity Y (up/down)
  playerVZ: 0, // velocity Z (forward/back)
  playerSpeed: 0.25,
  // Joystick
  joystickActive: false,
  joystickDX: 0, // -1 to 1
  joystickDY: 0, // -1 to 1
  joystickTouchId: null,
  // World bounds
  boundX: 18,
  boundYMin: 2,
  boundYMax: 20,
  boundZMin: -80,
  boundZMax: 10,
  // Combat
  enemies: [],
  playerBullets: [],
  enemyBullets: [],
  starItems: [],
  explosions: [],
  mountains: [],
  clouds: [],
  fireRate: 300,
  lastFire: 0,
  isFiring: false,
  goalPost: null,
  goalActive: false,
  landingPhase: false,
  landingTimer: 0,
  // Keyboard state
  keys: {},
};

// ─── Three.js Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x4488cc);
scene.fog = new THREE.Fog(0x4488cc, 60, 150);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 300);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x6688aa, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);

// ─── Voxel Helpers ───
function createVoxelBox(w, h, d, color) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshLambertMaterial({ color });
  return new THREE.Mesh(geo, mat);
}

function createPlayerPlane() {
  const group = new THREE.Group();
  const body = createVoxelBox(1.2, 0.5, 2.5, 0x2288ff);
  group.add(body);
  const wingL = createVoxelBox(3, 0.15, 1, 0x1166dd);
  wingL.position.set(-1.2, 0, 0.2);
  group.add(wingL);
  const wingR = createVoxelBox(3, 0.15, 1, 0x1166dd);
  wingR.position.set(1.2, 0, 0.2);
  group.add(wingR);
  const tail = createVoxelBox(0.8, 0.8, 0.5, 0x0044aa);
  tail.position.set(0, 0.4, 1.2);
  group.add(tail);
  const cockpit = createVoxelBox(0.6, 0.4, 0.6, 0x88ddff);
  cockpit.position.set(0, 0.35, -0.3);
  group.add(cockpit);
  const engine = createVoxelBox(0.4, 0.3, 0.3, 0xff6600);
  engine.position.set(0, 0, 1.4);
  group.add(engine);
  return group;
}

function createEnemyPlane() {
  const group = new THREE.Group();
  const body = createVoxelBox(1.2, 0.5, 2.2, 0xff2222);
  group.add(body);
  const wingL = createVoxelBox(2.5, 0.15, 0.9, 0xcc1111);
  wingL.position.set(-1, 0, 0.2);
  group.add(wingL);
  const wingR = createVoxelBox(2.5, 0.15, 0.9, 0xcc1111);
  wingR.position.set(1, 0, 0.2);
  group.add(wingR);
  const tail = createVoxelBox(0.7, 0.7, 0.5, 0x990000);
  tail.position.set(0, 0.35, 1.1);
  group.add(tail);
  const cockpit = createVoxelBox(0.5, 0.35, 0.5, 0xff8888);
  cockpit.position.set(0, 0.3, -0.2);
  group.add(cockpit);
  return group;
}

function createBullet(color, size = 0.15) {
  const geo = new THREE.BoxGeometry(size, size, size * 3);
  const mat = new THREE.MeshBasicMaterial({ color });
  return new THREE.Mesh(geo, mat);
}

function createStar() {
  const group = new THREE.Group();
  const ringGeo = new THREE.TorusGeometry(1.2, 0.12, 6, 12);
  const ringMat = new THREE.MeshLambertMaterial({ color: 0xffcc00 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  group.add(ring);
  const starGeo = new THREE.OctahedronGeometry(0.5, 0);
  const starMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
  const star = new THREE.Mesh(starGeo, starMat);
  group.add(star);
  return group;
}

function createMountain(x, z, scale) {
  const group = new THREE.Group();
  const colors = [0x336633, 0x2d5a2d, 0x3d7a3d, 0x445544];
  const c = colors[Math.floor(Math.random() * colors.length)];
  const layers = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < layers; i++) {
    const s = (layers - i) * scale * 1.5;
    const h = scale * 1.2;
    const box = createVoxelBox(s, h, s, c);
    box.position.set(0, i * h, 0);
    group.add(box);
  }
  group.position.set(x, -2, z);
  return group;
}

function createExplosion(pos) {
  const particles = [];
  for (let i = 0; i < 8; i++) {
    const size = 0.2 + Math.random() * 0.4;
    const colors = [0xff4400, 0xff8800, 0xffcc00, 0xff0000];
    const box = createVoxelBox(size, size, size, colors[Math.floor(Math.random() * colors.length)]);
    box.position.copy(pos);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 0.4,
      Math.random() * 0.3,
      (Math.random() - 0.5) * 0.4
    );
    scene.add(box);
    particles.push({ mesh: box, vel, life: 1.0 });
  }
  return particles;
}

// ─── Ground & Scenery ───
function createGround() {
  // Water plane (very large)
  const groundGeo = new THREE.PlaneGeometry(200, 300);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x225588 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -3;
  ground.position.z = -40;
  scene.add(ground);

  // Island
  const islandGeo = new THREE.BoxGeometry(50, 2, 100);
  const islandMat = new THREE.MeshLambertMaterial({ color: 0x44aa44 });
  const island = new THREE.Mesh(islandGeo, islandMat);
  island.position.set(0, -2.5, -40);
  scene.add(island);

  // Mountains spread across the map
  for (let i = 0; i < 20; i++) {
    const x = (Math.random() - 0.5) * 60;
    const z = -100 + Math.random() * 60;
    const s = 0.5 + Math.random() * 2;
    const mt = createMountain(x, z, s);
    scene.add(mt);
    state.mountains.push(mt);
  }
  // Side mountains
  for (let i = 0; i < 12; i++) {
    const side = i < 6 ? -1 : 1;
    const x = side * (22 + Math.random() * 20);
    const z = -60 + Math.random() * 80;
    const s = 0.8 + Math.random() * 2;
    const mt = createMountain(x, z, s);
    scene.add(mt);
    state.mountains.push(mt);
  }

  // Clouds
  for (let i = 0; i < 20; i++) {
    const cloud = createVoxelBox(
      2 + Math.random() * 5,
      0.8 + Math.random() * 1.2,
      2 + Math.random() * 4,
      0xffffff
    );
    cloud.material.transparent = true;
    cloud.material.opacity = 0.6;
    cloud.position.set(
      (Math.random() - 0.5) * 80,
      16 + Math.random() * 12,
      -80 + Math.random() * 100
    );
    scene.add(cloud);
    state.clouds.push(cloud);
  }
}

// ─── Spawn Enemies ───
function spawnEnemies() {
  state.enemies.forEach(e => scene.remove(e.mesh));
  state.enemies = [];
  const count = state.enemyCount;
  for (let i = 0; i < count; i++) {
    const mesh = createEnemyPlane();
    const x = (Math.random() - 0.5) * 24;
    const z = -35 - Math.random() * 25;
    const y = 6 + Math.random() * 6;
    mesh.position.set(x, y, z);
    scene.add(mesh);
    state.enemies.push({
      mesh, hp: 3, lastFire: 0,
      fireRate: 1500 - state.level * 100,
      moveTimer: Math.random() * Math.PI * 2,
      moveSpeed: 0.02 + state.level * 0.005,
      baseX: x, baseZ: z,
    });
  }
  updateHUD();
}

// ─── Spawn Stars ───
function spawnStars() {
  state.starItems.forEach(s => scene.remove(s.mesh));
  state.starItems = [];
  const count = 2 + state.level;
  for (let i = 0; i < count; i++) {
    const mesh = createStar();
    mesh.position.set(
      (Math.random() - 0.5) * 30,
      4 + Math.random() * 10,
      -15 - Math.random() * 50
    );
    scene.add(mesh);
    state.starItems.push({ mesh, collected: false });
  }
}

// ─── Goal Post ───
function spawnGoal() {
  if (state.goalPost) scene.remove(state.goalPost);
  const group = new THREE.Group();
  const pillarL = createVoxelBox(0.5, 6, 0.5, 0xffcc00);
  pillarL.position.set(-5, 3, 0);
  group.add(pillarL);
  const pillarR = createVoxelBox(0.5, 6, 0.5, 0xffcc00);
  pillarR.position.set(5, 3, 0);
  group.add(pillarR);
  const top = createVoxelBox(10.5, 0.8, 0.5, 0xffcc00);
  top.position.set(0, 6.2, 0);
  group.add(top);
  const banner = createVoxelBox(9, 2, 0.1, 0x00ff00);
  banner.material.transparent = true;
  banner.material.opacity = 0.5;
  banner.position.set(0, 4, 0);
  group.add(banner);
  group.position.set(0, 5, -65);
  group.visible = false;
  scene.add(group);
  state.goalPost = group;
  state.goalActive = false;
}

// ─── Player ───
let playerMesh;
function initPlayer() {
  if (playerMesh) scene.remove(playerMesh);
  playerMesh = createPlayerPlane();
  state.playerX = 0;
  state.playerY = 8;
  state.playerZ = 0;
  state.playerVX = 0;
  state.playerVY = 0;
  state.playerVZ = 0;
  playerMesh.position.set(0, 8, 0);
  scene.add(playerMesh);
  state.hp = state.maxHp;
}

// ─── Fire ───
function firePlayerBullet() {
  const now = Date.now();
  if (now - state.lastFire < state.fireRate) return;
  state.lastFire = now;
  const bulletCount = state.bulletLevel;
  if (bulletCount === 1) {
    const b = createBullet(0x00ffff);
    b.position.copy(playerMesh.position);
    b.position.z -= 1.5;
    scene.add(b);
    state.playerBullets.push({ mesh: b, vel: new THREE.Vector3(0, 0, -1.2) });
  } else if (bulletCount === 2) {
    for (let i = -1; i <= 1; i += 2) {
      const b = createBullet(0x00ffff);
      b.position.copy(playerMesh.position);
      b.position.x += i * 0.4;
      b.position.z -= 1.5;
      scene.add(b);
      state.playerBullets.push({ mesh: b, vel: new THREE.Vector3(0, 0, -1.2) });
    }
  } else {
    for (let i = 0; i < bulletCount; i++) {
      const angle = (i - (bulletCount - 1) / 2) * 0.15;
      const b = createBullet(0x00ffff, 0.15 + state.bulletLevel * 0.02);
      b.position.copy(playerMesh.position);
      b.position.z -= 1.5;
      scene.add(b);
      state.playerBullets.push({ mesh: b, vel: new THREE.Vector3(Math.sin(angle) * 0.3, 0, -1.2) });
    }
  }
}

function fireEnemyBullet(enemy) {
  const dir = new THREE.Vector3();
  dir.subVectors(playerMesh.position, enemy.mesh.position).normalize();
  const b = createBullet(0xff4444);
  b.position.copy(enemy.mesh.position);
  b.position.z += 1;
  scene.add(b);
  state.enemyBullets.push({ mesh: b, vel: dir.multiplyScalar(0.5 + state.level * 0.05) });
}

function checkCollision(a, b, dist) {
  return a.distanceTo(b) < dist;
}

// ─── HUD ───
function updateHUD() {
  document.getElementById('hud-level').textContent = state.level;
  document.getElementById('hud-score').textContent = state.score;
  document.getElementById('hud-enemies').textContent = state.enemies.filter(e => e.hp > 0).length;
  document.getElementById('hud-stars').textContent = state.stars;
  document.getElementById('hp-bar').style.width = (state.hp / state.maxHp * 100) + '%';
  document.getElementById('hp-bar').style.background = state.hp <= 1 ? '#ff3333' : '#0f0';
}

function gameOver(reason) {
  state.phase = 'gameover';
  document.getElementById('go-reason').textContent = reason;
  document.getElementById('game-over-screen').style.display = 'flex';
  document.getElementById('fire-btn').style.display = 'none';
  document.getElementById('joystick-zone').style.display = 'none';
}

function levelClear() {
  state.phase = 'levelclear';
  document.getElementById('clear-info').textContent = 
    `Score: ${state.score} | Stars: ${state.stars} | Bullet: Lv${state.bulletLevel} → Lv${state.bulletLevel + 1}`;
  document.getElementById('level-clear-screen').style.display = 'flex';
  document.getElementById('fire-btn').style.display = 'none';
  document.getElementById('joystick-zone').style.display = 'none';
}

function startLevel() {
  state.playerBullets.forEach(b => scene.remove(b.mesh));
  state.enemyBullets.forEach(b => scene.remove(b.mesh));
  state.playerBullets = [];
  state.enemyBullets = [];
  state.explosions.forEach(particles => particles.forEach(p => scene.remove(p.mesh)));
  state.explosions = [];
  state.enemyCount = state.level;
  state.hp = state.maxHp;
  state.goalActive = false;
  state.landingPhase = false;
  state.joystickDX = 0;
  state.joystickDY = 0;

  initPlayer();
  spawnEnemies();
  spawnStars();
  spawnGoal();

  document.getElementById('hud').style.display = 'flex';
  document.getElementById('fire-btn').style.display = 'flex';
  document.getElementById('joystick-zone').style.display = 'block';
  document.getElementById('game-over-screen').style.display = 'none';
  document.getElementById('level-clear-screen').style.display = 'none';

  state.phase = 'playing';
  updateHUD();
}

// ─── Update Camera ───
function updateCamera() {
  // Camera follows player from behind and above
  const camTargetX = state.playerX * 0.5;
  const camTargetY = state.playerY + 10;
  const camTargetZ = state.playerZ + 20;
  
  camera.position.x += (camTargetX - camera.position.x) * 0.05;
  camera.position.y += (camTargetY - camera.position.y) * 0.05;
  camera.position.z += (camTargetZ - camera.position.z) * 0.05;
  camera.lookAt(state.playerX, state.playerY, state.playerZ - 15);
}

// ─── Game Update ───
function update() {
  if (state.phase !== 'playing') return;
  const now = Date.now();

  // ─ Player Movement from Joystick + Keyboard ─
  let inputX = state.joystickDX;
  let inputY = state.joystickDY;

  // Keyboard overrides
  if (state.keys['ArrowLeft'] || state.keys['a']) inputX = -1;
  if (state.keys['ArrowRight'] || state.keys['d']) inputX = 1;
  if (state.keys['ArrowUp'] || state.keys['w']) inputY = -1; // forward = joystick up = -Y
  if (state.keys['ArrowDown'] || state.keys['s']) inputY = 1;  // down/back = joystick down = +Y

  // Apply input to velocity
  // X = left/right, Z = forward(negative)/back, Y = up/down
  const speed = state.playerSpeed;
  state.playerVX = inputX * speed;
  state.playerVZ = -inputY * speed * 1.5; // forward is negative Z, joystick up = inputY negative
  // Y movement: joystick up makes plane go forward AND slightly up, down goes down
  state.playerVY = -inputY * speed * 0.3;

  // Always move forward slowly even without input
  state.playerVZ -= 0.05;

  // Apply velocity
  state.playerX += state.playerVX;
  state.playerY += state.playerVY;
  state.playerZ += state.playerVZ;

  // ─ Clamp to bounds ─
  state.playerX = Math.max(-state.boundX, Math.min(state.boundX, state.playerX));
  state.playerY = Math.max(state.boundYMin, Math.min(state.boundYMax, state.playerY));
  state.playerZ = Math.max(state.boundZMin, Math.min(state.boundZMax, state.playerZ));

  // Update mesh
  playerMesh.position.set(state.playerX, state.playerY, state.playerZ);
  // Tilt based on movement
  playerMesh.rotation.z = -state.playerVX * 3; // roll when turning
  playerMesh.rotation.x = state.playerVZ * 0.5; // pitch when moving forward/back

  // Update camera
  updateCamera();

  // Auto fire
  if (state.isFiring) firePlayerBullet();

  // ─ Enemy AI ─
  state.enemies.forEach(enemy => {
    if (enemy.hp <= 0) return;
    enemy.moveTimer += enemy.moveSpeed;
    enemy.mesh.position.x = enemy.baseX + Math.sin(enemy.moveTimer) * 8;
    enemy.mesh.position.z = enemy.baseZ + Math.cos(enemy.moveTimer * 0.7) * 5;
    enemy.mesh.position.y = 6 + Math.sin(enemy.moveTimer * 1.3) * 2;
    enemy.mesh.lookAt(playerMesh.position);
    enemy.mesh.rotation.x = 0;
    if (now - enemy.lastFire > enemy.fireRate) {
      enemy.lastFire = now;
      fireEnemyBullet(enemy);
    }
  });

  // ─ Player bullets ─
  for (let i = state.playerBullets.length - 1; i >= 0; i--) {
    const b = state.playerBullets[i];
    b.mesh.position.add(b.vel);
    if (b.mesh.position.z < state.playerZ - 100 || Math.abs(b.mesh.position.x) > 50) {
      scene.remove(b.mesh);
      state.playerBullets.splice(i, 1);
      continue;
    }
    let hit = false;
    state.enemies.forEach(enemy => {
      if (enemy.hp <= 0) return;
      if (checkCollision(b.mesh.position, enemy.mesh.position, 2.5)) {
        enemy.hp--;
        hit = true;
        if (enemy.hp <= 0) {
          state.explosions.push(createExplosion(enemy.mesh.position.clone()));
          scene.remove(enemy.mesh);
          state.score += 100;
        }
      }
    });
    if (hit) {
      scene.remove(b.mesh);
      state.playerBullets.splice(i, 1);
      updateHUD();
    }
  }

  // ─ Enemy bullets ─
  for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
    const b = state.enemyBullets[i];
    b.mesh.position.add(b.vel);
    if (b.mesh.position.z > state.playerZ + 30 || Math.abs(b.mesh.position.x) > 50 || b.mesh.position.z < state.playerZ - 80) {
      scene.remove(b.mesh);
      state.enemyBullets.splice(i, 1);
      continue;
    }
    if (checkCollision(b.mesh.position, playerMesh.position, 1.8)) {
      scene.remove(b.mesh);
      state.enemyBullets.splice(i, 1);
      state.hp--;
      updateHUD();
      if (state.hp <= 0) {
        state.explosions.push(createExplosion(playerMesh.position.clone()));
        gameOver('Hit by enemy fire!');
        return;
      }
    }
  }

  // ─ Collision with enemies ─
  state.enemies.forEach(enemy => {
    if (enemy.hp <= 0) return;
    if (checkCollision(playerMesh.position, enemy.mesh.position, 3)) {
      state.explosions.push(createExplosion(playerMesh.position.clone()));
      gameOver('Crashed into enemy!');
    }
  });

  // ─ Stars ─
  state.starItems.forEach(s => {
    if (s.collected) return;
    s.mesh.rotation.y += 0.03;
    s.mesh.children[1].rotation.x += 0.05;
    if (checkCollision(playerMesh.position, s.mesh.position, 2.5)) {
      s.collected = true;
      scene.remove(s.mesh);
      state.stars++;
      state.score += 50;
      updateHUD();
    }
  });

  // ─ All enemies dead → goal ─
  const alive = state.enemies.filter(e => e.hp > 0).length;
  if (alive === 0 && !state.goalActive && state.goalPost) {
    state.goalPost.visible = true;
    state.goalActive = true;
    updateHUD();
  }

  // ─ Goal reached ─
  if (state.goalActive && state.goalPost) {
    if (checkCollision(playerMesh.position, state.goalPost.position, 6)) {
      state.landingPhase = true;
      state.landingTimer = 0;
      state.goalActive = false;
    }
  }

  // ─ Landing ─
  if (state.landingPhase) {
    state.landingTimer++;
    state.playerY -= 0.06;
    playerMesh.position.y = state.playerY;
    if (state.landingTimer > 80 || state.playerY < 1) {
      state.playerY = 8;
      levelClear();
    }
  }

  // ─ Ground collision ─
  if (state.playerY <= state.boundYMin && !state.landingPhase) {
    gameOver('Crashed into the ground!');
  }

  // ─ Explosions ─
  for (let i = state.explosions.length - 1; i >= 0; i--) {
    const particles = state.explosions[i];
    let allDead = true;
    particles.forEach(p => {
      p.life -= 0.02;
      if (p.life > 0) {
        allDead = false;
        p.mesh.position.add(p.vel);
        p.vel.y -= 0.005;
        p.mesh.scale.setScalar(p.life);
        p.mesh.material.opacity = p.life;
        p.mesh.material.transparent = true;
      } else {
        scene.remove(p.mesh);
      }
    });
    if (allDead) state.explosions.splice(i, 1);
  }

  // ─ Clouds ─
  state.clouds.forEach(c => {
    c.position.x += 0.01;
    if (c.position.x > 45) c.position.x = -45;
  });
}

// ─── Virtual Joystick ───
const joystickZone = document.getElementById('joystick-zone');
const joystickBase = document.getElementById('joystick-base');
const joystickThumb = document.getElementById('joystick-thumb');
const joyRadius = 45; // max displacement in px

joystickZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  e.stopPropagation();
  const touch = e.changedTouches[0];
  state.joystickTouchId = touch.identifier;
  state.joystickActive = true;
  updateJoystick(touch);
}, { passive: false });

joystickZone.addEventListener('touchmove', (e) => {
  e.preventDefault();
  e.stopPropagation();
  for (const touch of e.changedTouches) {
    if (touch.identifier === state.joystickTouchId) {
      updateJoystick(touch);
    }
  }
}, { passive: false });

joystickZone.addEventListener('touchend', (e) => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touch.identifier === state.joystickTouchId) {
      state.joystickActive = false;
      state.joystickDX = 0;
      state.joystickDY = 0;
      state.joystickTouchId = null;
      joystickThumb.style.left = '45px';
      joystickThumb.style.top = '45px';
    }
  }
}, { passive: false });

function updateJoystick(touch) {
  const rect = joystickBase.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  let dx = touch.clientX - centerX;
  let dy = touch.clientY - centerY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > joyRadius) {
    dx = dx / dist * joyRadius;
    dy = dy / dist * joyRadius;
  }
  // Normalized -1 to 1
  state.joystickDX = dx / joyRadius;
  state.joystickDY = dy / joyRadius;
  // Move thumb
  joystickThumb.style.left = (45 + dx) + 'px';
  joystickThumb.style.top = (45 + dy) + 'px';
}

// ─── Fire Button Touch ───
const fireBtn = document.getElementById('fire-btn');
fireBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  e.stopPropagation();
  state.isFiring = true;
}, { passive: false });
fireBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  e.stopPropagation();
  state.isFiring = false;
}, { passive: false });
fireBtn.addEventListener('mousedown', (e) => {
  e.stopPropagation();
  state.isFiring = true;
});
fireBtn.addEventListener('mouseup', () => {
  state.isFiring = false;
});

// ─── Keyboard ───
document.addEventListener('keydown', (e) => {
  state.keys[e.key] = true;
  if (e.key === ' ') { state.isFiring = true; e.preventDefault(); }
});
document.addEventListener('keyup', (e) => {
  state.keys[e.key] = false;
  if (e.key === ' ') state.isFiring = false;
});

// ─── UI Buttons ───
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('intro-overlay').style.display = 'flex';
  state.phase = 'intro';
  setTimeout(() => {
    document.getElementById('intro-overlay').style.display = 'none';
    startLevel();
  }, 3000);
});

document.getElementById('retry-btn').addEventListener('click', () => {
  state.level = 1;
  state.score = 0;
  state.stars = 0;
  state.bulletLevel = 1;
  startLevel();
});

document.getElementById('next-btn').addEventListener('click', () => {
  state.level++;
  state.bulletLevel++;
  startLevel();
});

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Init ───
createGround();

function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
